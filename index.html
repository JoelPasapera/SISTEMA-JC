<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Asistencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ═══ PANTALLA DE CARGA ═══ -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
                </svg>
            </div>
            <p class="loading-text">Cargando datos del sistema…</p>
            <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        </div>
    </div>

    <!-- ═══ ENCABEZADO ═══ -->
    <header class="header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="brand-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M4.26 10.147a60.438 60.438 0 00-.491 6.347A48.62 48.62 0 0112 20.904a48.62 48.62 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.636 50.636 0 00-2.658-.813A59.906 59.906 0 0112 3.493a59.903 59.903 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5"/>
                    </svg>
                </div>
                <div>
                    <h1 class="brand-title">Registro de Asistencia</h1>
                    <p class="brand-subtitle" id="header-date"></p>
                </div>
            </div>
            <div class="header-actions">
                <div class="connection-status" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Conectando…</span>
                </div>
            </div>
        </div>
    </header>

    <!-- ═══ NAVEGACIÓN DE SECCIONES ═══ -->
    <nav class="section-nav">
        <div class="section-nav-inner">
            <button class="nav-tab active" data-section="attendance">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                </svg>
                Asistencia
            </button>
            <button class="nav-tab" data-section="grades">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                </svg>
                Notas
            </button>
        </div>
    </nav>

    <!-- ═══ CONTENIDO PRINCIPAL ═══ -->
    <main class="main-content">

        <!-- ─── SECCIÓN: ASISTENCIA ─── -->
        <section id="section-attendance" class="content-section active">

            <!-- Selector de salón -->
            <div class="classroom-selector" id="classroom-selector">
                <h2 class="selector-title">Seleccionar Salón</h2>
                <div class="classroom-tabs" id="classroom-tabs">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>

            <!-- Fecha de registro -->
            <div class="date-picker-wrapper" id="date-picker-wrapper" style="display:none;">
                <label class="date-label" for="attendance-date">Fecha de registro:</label>
                <input type="date" id="attendance-date" class="date-input">
            </div>

            <!-- Tabla de asistencia -->
            <div class="attendance-container" id="attendance-container" style="display:none;">
                <div class="table-header">
                    <div class="table-info">
                        <h3 class="table-title" id="table-title"></h3>
                        <p class="table-subtitle" id="table-subtitle"></p>
                    </div>
                    <div class="table-stats" id="table-stats">
                        <div class="stat stat-present">
                            <span class="stat-number" id="stat-present">0</span>
                            <span class="stat-label">Presentes</span>
                        </div>
                        <div class="stat stat-late">
                            <span class="stat-number" id="stat-late">0</span>
                            <span class="stat-label">Tardanzas</span>
                        </div>
                        <div class="stat stat-absent">
                            <span class="stat-number" id="stat-absent">0</span>
                            <span class="stat-label">Faltas</span>
                        </div>
                    </div>
                </div>

                <!-- Acciones rápidas -->
                <div class="quick-actions">
                    <button class="quick-btn" id="btn-all-present" title="Marcar todos presentes">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        Todos presentes
                    </button>
                    <button class="quick-btn quick-btn-outline" id="btn-reset" title="Resetear">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        Resetear
                    </button>
                </div>

                <!-- Tabla -->
                <div class="table-scroll">
                    <table class="attendance-table" id="attendance-table">
                        <thead>
                            <tr>
                                <th class="col-index">#</th>
                                <th class="col-name">Estudiante</th>
                                <th class="col-status">Estado</th>
                                <th class="col-reason">Motivo de Inasistencia</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-body">
                            <!-- Se llena dinámicamente -->
                        </tbody>
                    </table>
                </div>

                <!-- Botón guardar -->
                <div class="save-section">
                    <button class="save-btn" id="btn-save" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 13l4 4L19 7"/>
                        </svg>
                        <span>Guardar Asistencia</span>
                    </button>
                </div>
            </div>

            <!-- Estado vacío -->
            <div class="empty-state" id="empty-state" style="display:none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
                <p>No se encontraron datos de estudiantes.</p>
                <button class="retry-btn" id="btn-retry">Reintentar</button>
            </div>
        </section>

        <!-- ─── SECCIÓN: NOTAS ─── -->
        <section id="section-grades" class="content-section">
            <div class="coming-soon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <h3>Módulo de Notas</h3>
                <p>Este módulo estará disponible próximamente.</p>
            </div>
        </section>
    </main>

    <!-- ═══ MODAL DE CONFIRMACIÓN ═══ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="confirm-modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Confirmar</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancelar</button>
                <button class="modal-btn modal-btn-confirm" id="modal-confirm">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- ═══ NOTIFICACIONES ═══ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ═══ SCRIPTS (modular) ═══ -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
